<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenIntegrations — Filter Config</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px; 
            margin: 50px auto; 
            padding: 20px;
            background: #0d1117;
            color: #c9d1d9;
        }
        h1 { color: #58a6ff; margin-bottom: 10px; }
        p { color: #8b949e; margin-bottom: 20px; }
        code { background: #161b22; padding: 2px 6px; border-radius: 3px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        textarea { 
            width: 100%; 
            height: 200px; 
            font-family: 'Fira Code', monospace;
            background: #161b22;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            resize: vertical;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            background: #161b22;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        button { 
            padding: 10px 20px; 
            background: #238636; 
            color: white; 
            border: 1px solid #2ea043;
            border-radius: 6px; 
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover { background: #2ea043; }
        button.secondary { background: #21262d; border-color: #30363d; }
        button.secondary:hover { background: #30363d; }
        .status { 
            margin-top: 20px; 
            padding: 12px; 
            border-radius: 6px; 
            display: none;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success { background: #051b11; color: #3fb950; border: 1px solid #238636; display: block; }
        .error { background: #1b0505; color: #f85149; border: 1px solid #da3633; display: block; }
        .info { background: #0d1117; color: #8b949e; border: 1px solid #30363d; display: block; }
        .hint { font-size: 12px; color: #8b949e; margin-top: 5px; }
        .nav { margin-bottom: 30px; }
        .nav a { color: #58a6ff; text-decoration: none; }
        .nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="https://github.com/grevinden/openIntegrations">← grevinden/openIntegrations</a>
    </div>

    <h1>⚙️ Filter Paths Configuration</h1>
    <p>Настройка путей для авто-фильтрации в <code>openIntegrations-commons-filtered</code></p>
    
    <label for="paths">Пути (по одному на строку):</label>
    <textarea id="paths"># Filter paths
src/addins/commons
src/addins/check_vulnerabilities.bat</textarea>
    <p class="hint">Строки начинающиеся с # игнорируются</p>
    
    <br>
    <label for="token">GitHub Personal Access Token (Classic):</label>
    <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <p class="hint">Нужен <b>Classic</b> токен с правами <code>repo</code> и <code>workflow</code></p>
    
    <br>
    <button onclick="saveConfig()">💾 Сохранить</button>
    <button onclick="loadConfig()" class="secondary">📥 Загрузить</button>
    <button onclick="testToken()" class="secondary">🔑 Проверить токен</button>
    
    <div id="status"></div>

    <script>
        const REPO = 'grevinden/openIntegrations';
        const VAR_NAME = 'FILTER_PATHS';
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
        
        function getHeaders() {
            const token = document.getElementById('token').value;
            if (!token) {
                showStatus('❌ Введите токен!', 'error');
                return null;
            }
            return {
                'Authorization': 'Bearer ' + token,
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
                'Content-Type': 'application/json'
            };
        }
        
        async function testToken() {
            showStatus('Проверка токена...', 'info');
            
            const headers = getHeaders();
            if (!headers) return;
            
            try {
                // Проверяем доступ к репозиторию
                const repoResponse = await fetch(
                    `https://api.github.com/repos/${REPO}`,
                    { method: 'GET', headers }
                );
                
                // Проверяем доступ к variables
                const varResponse = await fetch(
                    `https://api.github.com/repos/${REPO}/actions/variables`,
                    { method: 'GET', headers }
                );
                
                let message = '';
                
                if (repoResponse.ok) {
                    message += '✅ Доступ к репозиторию: OK\n';
                } else {
                    message += '❌ Доступ к репозиторию: ' + repoResponse.status + '\n';
                }
                
                if (varResponse.ok) {
                    message += '✅ Доступ к переменным: OK\n';
                } else {
                    message += '❌ Доступ к переменным: ' + varResponse.status + '\n';
                }
                
                if (repoResponse.ok && varResponse.ok) {
                    message += '\n✅ Токен работает корректно!';
                    showStatus(message, 'success');
                } else {
                    message += '\n❌ Проверьте права токена (нужны repo и workflow).';
                    showStatus(message, 'error');
                }
                
            } catch (error) {
                showStatus('❌ Ошибка сети: ' + error.message, 'error');
            }
        }
        
        async function loadConfig() {
            showStatus('Загрузка...', 'info');
            
            const headers = getHeaders();
            if (!headers) return;
            
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${REPO}/actions/variables`,
                    { method: 'GET', headers }
                );
                
                if (!response.ok) {
                    const text = await response.text();
                    showStatus('❌ HTTP ' + response.status + '\n' + text, 'error');
                    return;
                }
                
                const data = await response.json();
                const variable = data.variables.find(v => v.name === VAR_NAME);
                
                if (variable) {
                    document.getElementById('paths').value = variable.value.replace(/\s+/g, '\n');
                    showStatus('✅ Загружено: ' + variable.value, 'success');
                } else {
                    showStatus('ℹ️ Переменная FILTER_PATHS не задана.', 'info');
                }
                
            } catch (error) {
                showStatus('❌ Ошибка: ' + error.message, 'error');
            }
        }
        
        async function saveConfig() {
            const paths = document.getElementById('paths').value
                .split('\n')
                .map(line => line.trim())
                .filter(line => line && !line.startsWith('#'))
                .join(' ');
            
            if (!paths) {
                showStatus('❌ Укажите хотя бы один путь!', 'error');
                return;
            }
            
            showStatus('Сохранение...', 'info');
            
            const headers = getHeaders();
            if (!headers) return;
            
            try {
                // Получаем список переменных
                const listResponse = await fetch(
                    `https://api.github.com/repos/${REPO}/actions/variables`,
                    { method: 'GET', headers }
                );
                
                if (!listResponse.ok) {
                    const text = await listResponse.text();
                    showStatus('❌ Ошибка получения списка переменных: ' + listResponse.status + '\n' + text, 'error');
                    return;
                }
                
                const data = await listResponse.json();
                const existingVar = data.variables.find(v => v.name === VAR_NAME);
                
                let response;
                
                if (existingVar) {
                    // Обновляем
                    response = await fetch(
                        `https://api.github.com/repos/${REPO}/actions/variables/${VAR_NAME}`,
                        { 
                            method: 'PATCH', 
                            headers,
                            body: JSON.stringify({ 
                                name: VAR_NAME, 
                                value: paths 
                            })
                        }
                    );
                } else {
                    // Создаём
                    response = await fetch(
                        `https://api.github.com/repos/${REPO}/actions/variables`,
                        { 
                            method: 'POST', 
                            headers,
                            body: JSON.stringify({ 
                                name: VAR_NAME, 
                                value: paths 
                            })
                        }
                    );
                }
                
                if (response.status === 204 || response.status === 201) {
                    showStatus('✅ Успешно!\n\nПути: ' + paths, 'success');
                } else {
                    const text = await response.text();
                    
                    if (response.status === 403) {
                        showStatus('❌ Ошибка 403: Доступ запрещён.\n\n' +
                            'Убедитесь что:\n' +
                            '1. Токен CLASSIC (не Fine-grained)\n' +
                            '2. Есть права: repo, workflow\n' +
                            '3. Токен не просрочен\n\n' +
                            'Ответ: ' + text, 'error');
                    } else if (response.status === 401) {
                        showStatus('❌ Ошибка 401: Неверный токен.\n\nПроверьте токен.', 'error');
                    } else {
                        showStatus('❌ Ошибка ' + response.status + '\n' + text, 'error');
                    }
                }
                
            } catch (error) {
                showStatus('❌ Ошибка сети: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
