name: Sync Upstream

on:
  schedule:
    - cron: '0 3,15 * * *'  # Каждый день в 3:00 и 15:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/Bayselonarrend/OpenIntegrations.git
          git fetch upstream
      
      - name: Check for updates
        id: check
        run: |
          git checkout main
          
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          
          echo "local_commit=$LOCAL" >> $GITHUB_OUTPUT
          echo "upstream_commit=$UPSTREAM" >> $GITHUB_OUTPUT
          
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Already up to date"
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "Updates available"
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Merge upstream
        if: steps.check.outputs.needs_update == 'true'
        env:
          UPSTREAM_COMMIT: ${{ steps.check.outputs.upstream_commit }}
        run: |
          git merge upstream/main -m "Sync with upstream
          
          Upstream commit: ${UPSTREAM_COMMIT}"
      
      - name: Push changes
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git push origin main
          echo "Synced successfully!"
