name: Filter and Push to Commons

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      filter_paths:
        description: 'Paths to filter (space-separated)'
        required: false
        default: 'src/addins/commons src/addins/check_vulnerabilities.bat'

jobs:
  filter:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source (this repo)
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 0
      
      - name: Checkout target (filtered repo)
        uses: actions/checkout@v4
        with:
          repository: grevinden/openIntegrations-commons-filtered
          token: ${{ secrets.GIT_TOKEN }}
          path: target
      
      - name: Install git-filter-repo
        run: pip install git-filter-repo
      
      - name: Filter and copy to target
        env:
          FILTER_PATHS: ${{ github.event.inputs.filter_paths || 'src/addins/commons src/addins/check_vulnerabilities.bat' }}
        run: |
          cd source
          
          # Формируем аргументы для filter-repo
          ARGS=""
          for p in $FILTER_PATHS; do
            ARGS="$ARGS --path $p"
          done
          
          echo "Filtering with: $ARGS"
          
          # Фильтруем и отправляем в target
          git filter-repo $ARGS --force --target ../target
      
      - name: Push to FILTER_REPO
        run: |
          cd target
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          echo "Changes to push:"
          git log --oneline -5
          
          git push origin main --force
          echo "Done!"
