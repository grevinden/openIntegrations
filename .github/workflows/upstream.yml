name: Sync Upstream

on:
  schedule:
    - cron: '0 3,15 * * *'  # Каждый день в 3:00 и 15:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # Включаем поддержку наших merge-стратегий из .gitattributes
          git config merge.ours.driver true
      
      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/Bayselonarrend/OpenIntegrations.git
          git fetch upstream
      
      - name: Check for updates
        id: check
        run: |
          git checkout main
          
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          
          echo "local_commit=$LOCAL" >> $GITHUB_OUTPUT
          echo "upstream_commit=$UPSTREAM" >> $GITHUB_OUTPUT
          
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Already up to date"
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "Updates available"
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Rebase on upstream
        if: steps.check.outputs.needs_update == 'true'
        env:
          UPSTREAM_COMMIT: ${{ steps.check.outputs.upstream_commit }}
        run: |
          echo "Starting rebase on upstream..."
          
          # Rebase: наши коммиты будут поверх upstream
          # -X ours: при конфликтах выбираем наши изменения
          # .gitattributes: папка .github всегда сохраняет нашу версию
          if git rebase upstream/main -X ours; then
            echo "Rebase successful"
          else
            echo "Rebase conflicts detected, resolving with ours strategy..."
            # Разрешаем все конфликты в пользу наших изменений
            while git diff --name-only --diff-filter=U | grep -q .; do
              git checkout --ours .
              git add .
            done
            git rebase --continue
          fi
      
      - name: Verify .github folder is intact
        if: steps.check.outputs.needs_update == 'true'
        run: |
          echo "Checking protected files..."
          if [ -d ".github" ]; then
            echo "✓ .github folder preserved"
            ls -la .github/workflows/
          else
            echo "✗ .github folder missing! Restoring..."
            git checkout HEAD~1 -- .github
            git commit -m "Restore .github folder after rebase"
          fi
      
      - name: Show changes
        if: steps.check.outputs.needs_update == 'true'
        run: |
          echo "Changes after rebase:"
          git diff --stat upstream/main..HEAD
      
      - name: Push changes
        if: steps.check.outputs.needs_update == 'true'
        env:
          UPSTREAM_COMMIT: ${{ steps.check.outputs.upstream_commit }}
        run: |
          # Принудительный пуш нужен после rebase (история переписана)
          git push origin main --force-with-lease
          echo "Synced successfully!"
          echo "Upstream: ${UPSTREAM_COMMIT}"
