<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Filter Config</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 200px; font-family: monospace; }
        button { padding: 10px 20px; background: #2ea44f; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .status { margin-top: 20px; padding: 10px; border-radius: 6px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Filter Paths Configuration</h1>
    <p>One path per line. Lines starting with # are comments.</p>
    
    <textarea id="paths"># Filter paths
src/addins/commons
src/addins/check_vulnerabilities.bat</textarea>
    
    <br><br>
    <button onclick="saveConfig()">Save Configuration</button>
    <div id="status"></div>

    <script>
        async function saveConfig() {
            const paths = document.getElementById('paths').value;
            const token = prompt('Enter GitHub token:');
            
            try {
                const response = await fetch('https://api.github.com/repos/grevinden/openIntegrations/actions/variables/FILTER_PATHS', {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ value: paths.replace(/\n/g, ' ') })
                });
                
                if (response.ok) {
                    document.getElementById('status').innerHTML = '<div class="status success">✅ Configuration saved!</div>';
                } else {
                    throw new Error('Failed to save');
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '<div class="status error">❌ Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
