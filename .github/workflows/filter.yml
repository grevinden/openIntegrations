name: Filter and Update Fork

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      filter_paths:
        description: 'Paths to filter (space-separated)'
        required: false
        default: 'src/addins/commons src/addins/check_vulnerabilities.bat'

jobs:
  filter:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install git-filter-repo
        run: pip install git-filter-repo
      
      - name: Filter and push
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          # Получаем пути из input или используем дефолтные
          PATHS="${{ github.event.inputs.filter_paths || 'src/addins/commons src/addins/check_vulnerabilities.bat' }}"
          
          # Формируем аргументы
          ARGS=""
          for p in $PATHS; do
            ARGS="$ARGS --path $p"
          done
          
          # Фильтруем в копии
          TEMP_DIR=$(mktemp -d)
          cp -r "$GITHUB_WORKSPACE" "$TEMP_DIR/filtered"
          cd "$TEMP_DIR/filtered"
          
          git filter-repo $ARGS --force
          
          # Пушим
          git remote add origin https://oauth2:${GIT_TOKEN}@github.com/grevinden/openIntegrations-commons-filtered.git
          git push -u origin main --force
          
          echo "Done! Commit: $(git rev-parse HEAD)"
